nexusDescription="[font=Trebuchet MS][size=2][font=Papyrus][size=4][b].: Features :.[/b][/size][/font]\n<br />\n<br />Tweaks[color=#d8d8d8][list]\n<br />[*]Before each game, you can choose to keep the remaining cards from your previous hand. Doesn't apply to Random mode.\n<br />[*]SPID is used to distribute merchandise to vendors and loot to NPC. Unique cards continue to be distributed by script.\n<br />[*]Bought packs are \"sealed\" and always yield max amount of cards. Looted packs continue to yield min-max.\n<br />[*]Vendors have 1-5 packs for sale. They used to have 0-3. [color=#999999]This can be changed in INI file.[/color]\n<br />[*]Card packs can drop from more kinds of NPC. They used to drop only from 5 factions. [color=#999999]This can be changed in INI file.[/color]\n<br />[*]Drop rate of card packs is reduced to 20%. It used to be ~38%, I think. [color=#999999]This can be changed in INI file.[/color]\n<br />[*]Cards are weightless and packs weigh a little. It used to be the other way around.\n<br />[*]Cards are renamed for better sorting in inventory.\n<br />[*]Most NPC can say a couple of extra goodbye lines. They used to say only \"until next time\".\n<br />[*]Non-unique NPC only show Triple Triad dialogue as long as you have a copy of the rulebook in your inventory.\n<br />[*]Speechless Greybeards have their voiced lines replaced by a silent one.\n<br />[*]Bet menu has its buttons repositioned for a more convenient use.\n<br />[*]Winning under Difference trade rule rewards half as much cards as it used to.\n<br />[*]Card collection book has better text formatting.\n<br />[/list][/color]\n<br />Fixes[color=#d8d8d8][list]\n<br />[*]Looted card packs are also converted into light objects upon pick up, just as those you buy.\n<br />[*]If you've been unable to add multiple copies of non-unique cards to your hand, now you are able to.\n<br />[*]To prevent a bug with conversation camera mods, your character is moved to game cell before camera is set to 1st person.\n<br />[*]To ensure the board fits on screen, FOV is forced to 90 upon entering game cell. It reverts back upon leaving. [color=#999999]Requires[url=https://www.nexusmods.com/skyrimspecialedition/mods/24858] ConsoleUtil[/url] to work.[/color]\n<br />[*]Misspelling, typos and layout issues in dialogues and menus.\n<br />[/list][/color]\n<br />[font=Papyrus][size=4][b].: Requirements :.[/b][/size][/font]\n<br />[color=#d8d8d8]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/36869] Spell Perk Item Distributor[/url] (SPID)\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/42522] Triple Triad Card Game in Skyrim[/url]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/73047] Triple Triad in Skyrim - Tamriel Edition[/url] (Main Version)\n<br />[/color]\n<br />[font=Papyrus][size=4][b].: Installation :.[/b][/size][/font]\n<br />[color=#d8d8d8]\n<br />Download and install the main file as normal. Safe to do so mid-playthrough.\n<br />Overwrite any other Triple Triad mods. Load the light-flagged plugin below [i]Triple Triad Skyrim.esp[/i].\n<br />[/color]\n<br />[font=Papyrus][size=4][b].: Recommendations :.[/b][/size][/font]\n<br />\n<br />My Mods[color=#d8d8d8]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/95331] Shape Shift[/url] : Dynamically modify visual aspects of your character, from head to body, in and out of combat.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/90743] Better Blades [/url]: Recruit up to 9 blades. Gear them up according to their skills. Change your dragon hunting party.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/88388] Helm Hair [/url]: Give your character a hairline to exhibit under headgear while using custom hairstyles.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/86085] Body Language [/url]: Dynamically replace animations based on character's personality. Powered by dualsun's Pretty Idles.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/78569] Unique Physique [/url]: Class-based muscularity for NPC and exclusive muscularity for the playable character.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/76829] Slider Splicer [/url]: A command line script to combine 0 and 100 weight sliders from any number of different BodySlide presets.\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/74899] Old Fashion [/url]: Distribute default outfits to old female NPC, if you need. Customize their shape and textures, if you want.\n<br />[/color]\n<br />[font=Papyrus][size=4][b].: Thanksgiving :.[/b][/size][/font]\n<br />[color=#d8d8d8]\n<br />[/color]Dylbill[color=#d8d8d8] for the original mod;\n<br />[/color]JustIChris[color=#d8d8d8] for the redesign and expansion;\n<br />[/color]powerofthree[color=#d8d8d8] and [/color]sasnikol[color=#d8d8d8] for SPID;\n<br />[/color]ElminsterAU[color=#d8d8d8] for SSEEdit.\n<br />[/color][/size][/font]"
